image: node:22.5

stages:
    - lint
    - deploy

cache:
    paths:
        - node_modules/

eslint:
    stage: lint
    script:
        - npm i
        - npm run lint
    only:
        - merge_requests
        - develop

type-check:
    stage: lint
    script:
        - npm i
        - npm run type-check
    only:
        - merge_requests
        - develop

production:
    stage: deploy
    before_script:
        - 'which ssh-agent || ( apk add --no-cache openssh-client )'
        - eval $(ssh-agent -s)
        - mkdir -p ~/.ssh
        - chmod 700 ~/.ssh
        - '[[ -f /.dockerenv ]] && echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config'
    environment:
        name: production
        url: https://thomaslamothe.com
    script:
        - echo "$DEPLOY_KEY" | tr -d '\r' | ssh-add - > /dev/null
        - chmod 700 ~/.ssh
        - npm i
        - echo "$DOTENV_PRODUCTION" > .env.production
        - npm run build
        - scp -rp dist/* $DEPLOY_HOST:/srv/thomaslamothe.com/
    only:
        - master
    when: manual
