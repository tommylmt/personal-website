<!DOCTYPE html>
<html lang="en" >
<head>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/meyer-reset/2.0/reset.min.css">	
  	<meta charset="UTF-8">
  	<title>canvas-dot-grid gradient</title>
  	<link rel="stylesheet" type="text/css" href="../css/fonts.css">
  	<style type="text/css">
	  	body{
	  		background: #000;
	  		position: relative;
	  	}
		body,
		#playground {
		  position: absolute;
		  top: 0;
		  right: 0;
		  bottom: 0;
		  left: 0;
		  width: 100%;
		  height: 100%;
		  background-color: #000;
		}
		.test{
			position: absolute;
			z-index: 9999;
			color: #fff;
			width: 100vw;
			height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			text-align: center;
		}
		.test h2{
			font-family: "Nevis", sans-serif;
			text-transform: uppercase;
			line-height: 1.5em;
			letter-spacing: .2em;
			font-size: 30pt;
		}
		.test h1{
			font-family: "Gotham Bold", sans-serif;
			text-transform: uppercase;
			line-height: 1.5em;
			letter-spacing: .2em;
			font-size: 60pt;
		}
  	</style>

</head>
<body>
<!-- partial:index.partial.html -->
	<div class="test">
		<div class="title">
			<h2>I am</h2>
			<h1>photograph</h1>
		</div>
	</div>
	<canvas id="playground"></canvas>

<!-- partial -->
 	<script src='https://cdnjs.cloudflare.com/ajax/libs/gsap/1.19.0/TweenMax.min.js'></script>
	<script type="text/javascript">
		document.addEventListener('DOMContentLoaded', init, false);

		let APP;

		function init() {
		  APP = new App();

		  events();

		  loop();
		}

		function loop() {
		  APP.render();

		  requestAnimationFrame(loop);
		}

		function events() {
		  document.addEventListener('mousemove', APP.mousemoveHandler, false);
		  document.addEventListener('mouseleave', APP.mouseleaveHandler, false);

		  window.addEventListener('resize', APP.resize, false);
		}

		class App {
		  constructor() {
		    this.canvas = document.getElementById('playground');
		    this.context = this.canvas.getContext('2d');

		    this.canvas.width = this.width = window.innerWidth;
		    this.canvas.height = this.height = window.innerHeight;

		    this.setupDots();

		    this.resize = this.resize.bind(this);
		    this.mousemoveHandler = this.mousemoveHandler.bind(this);
		    this.mouseleaveHandler = this.mouseleaveHandler.bind(this);
		  }

		  setupDots() {
		    this.dots = [];
		    this.scl = 40;
		    this.cols = this.width / this.scl;
		    this.rows = this.height / this.scl;

		    let id = 0;
		    for (let x = 0; x < this.cols; x += 1) {
		      for (let y = 0; y < this.rows; y += 1) {
		        this.dots.push(new Dot(id, x * this.scl, y * this.scl, this.context, this.scl));
		        id += 1;
		      }
		    }
		  }

		  resize() {
		    this.canvas.width = this.width = window.innerWidth;
		    this.canvas.height = this.height = window.innerHeight;

		    this.setupDots();
		  }

		  mousemoveHandler(event) {
		    this.dots.forEach(d => {
		      d.mousemove(event);
		    });
		  }

		  mouseleaveHandler() {
		    this.dots.forEach(d => {
		      d.isHover = false;
		    });
		  }

		  render() {
		    this.context.clearRect(0, 0, this.width, this.height);

		    this.dots.forEach(d => {
		      d.render();
		    });
		  }}


		class Dot {
		  constructor(id, x, y, context, scl) {
		    this.id = id;
		    this.x = x;
		    this.y = y;
		    this.new = { x: x, y: y };
		    this.radius = 5;

		    this.context = context;
		    this.scl = scl;
		    this.isHover = false;
		    this.isANimated = false;
		  }

		  mousemove(event) {
		    const x = event.clientX;
		    const y = event.clientY;

		    this.isHover = Math.abs(this.x - x) < this.scl / 4 * 3 && Math.abs(this.y - y) < this.scl / 4 * 3 ? true : false;

		    if (this.isHover) {
		      TweenMax.to(
		      this.new,
		      0.4,
		      { x: x, y: y });

		    } else {
		      TweenMax.to(
		      this.new,
		      0.4,
		      { x: this.x, y: this.y });

		    }
		  }

		  render() {
		    this.context.beginPath();
		    this.context.arc(this.new.x, this.new.y, this.radius, 0, 2 * Math.PI, false);

		    // var vw = Math.max(document.documentElement.clientWidth, window.innerWidth || 0),
		    // 	vh = Math.max(document.documentElement.clientHeight, window.innerHeight || 0);

		    const gradient = this.context.createLinearGradient(0,0, Math.max(document.documentElement.clientWidth, window.innerWidth || 0), Math.max(document.documentElement.clientHeight, window.innerHeight || 0));

			gradient.addColorStop(0, '#ec0877');
			gradient.addColorStop(.325, '#f93044');
			gradient.addColorStop(.45, '#f75735');
			gradient.addColorStop(1, '#fe880e');

		    this.context.fillStyle = gradient;
		    this.context.globalAlpha = this.isHover ? 1 : 0.5;
		    this.context.fill();
		  }}
	</script>
</body>
</html>
