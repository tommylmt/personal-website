name: Code analysis

on:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Perform eslint check
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
      - name: Install dependencies
        run: npm install
      - name: Eslint
        run: npm run lint

  type-check:
    runs-on: ubuntu-latest
    name: Perform Typescript check
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
      - name: Check Typescript
        run: npm run type-check

  tests:
    runs-on: ubuntu-latest
    name: Run all tests
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
      - name: Perform test validation
        run: npm run test -- --reporter=verbose --reporter=github-actions
      - name: Check output
        run: cat $GITHUB_STEP_SUMMARY
