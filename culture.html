<!DOCTYPE html>
<html>
<head>
	<meta content="width=device-width, initial-scale=1" name="viewport" />
	<meta charset="utf-8">

	<!-- <link rel="stylesheet" type="text/css" href="css/reset.css"> -->
	<link rel="stylesheet" type="text/css" href="css/fonts.css">
	<link rel="stylesheet" type="text/css" href="css/fullpage.css">
	<link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.8.2/css/all.css" integrity="sha384-oS3vJWv+0UjzBfQzYUhtDYW+Pj2yciDJxpsK1OYPAYjqT085Qq/1cq5FLXAZQ7Ay" crossorigin="anonymous">
	<link rel="stylesheet" type="text/css" href="css/loader.css">
	<link rel="stylesheet" type="text/css" href="css/culture.css">
	<link rel="stylesheet" type="text/css" href="css/menu.css">
	
	<!-- Librairie jQuery -->
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script src="js/fullpage.js"></script>
</head>
<body>
	<div class="wrapper-loader">
	  <div class="loader">
	    <div class="a-wave one-wave"></div>
	  </div>
	  <div class="avatar">
	    <img src="http://thomaslamothe.free.fr/img/profil.jpg" alt="Toma">
	  </div>
	</div>
	<div class="wrapper">
		<div class="open-menu">
			<div class="a-bar-up"></div>
			<div class="a-bar-down"></div>
		</div>
		<div class="menu">
			<div class="close">
				<p><i class="fas fa-times"></i></p>
			</div>
			<ul>
				<li class="un"><a href="about.html"><div class="tiret"></div>About me</a></li>
				<li class="deux submenu"><a href="#"><div class="tiret"></div>Work</a>
					<ul class="submenu-container">
						<li><a href="portfolio.html"><div class="tiretsub"></div>Web Development</a></li>
						<li><a href="photos.html"><div class="tiretsub"></div>Photos</a></li>		
					</ul>
				</li>
				<li class="trois"><a href="culture.html"><div class="tiret"></div>Culture</a></li>
				<li class="quatre"><a href="contact.html"><div class="tiret"></div>Contact</a></li>
			</ul>
		</div>
	</div>
	<div id="fullpage">
		<div class="section">
			<div class="container-title-culture">
				<div class="culture-title-holder">
					<h1>Culture in <span class="year">2019</span></h1>
					<h2>All the things I've <i class="fas fa-heart"></i> this year</h2>
				</div>
				<div class="blob first-blob">
					<img src="img/svg/blob-shape-one.svg">
				</div>
				<div class="blob second-blob">
					<img src="img/svg/blob-shape-two.svg">
				</div>
				<div class="blob third-blob">
					<img src="img/svg/blob-shape-three.svg">
				</div>
				<div class="blob fourth-blob">
					<img src="img/svg/blob-shape-four.svg">
				</div>
				<div class="blob fifth-blob">
					<img src="img/svg/blob-shape.svg">
				</div>
				<div class="blob six-blob">
					<img src="img/svg/blob-shape-six.svg">
				</div>
			</div>
		</div>
		<div class="section">
			<div class="main-movies">
				<div class="left-movie">
					<h3>Movies</h3>
				</div>
				<div class="right-movie">
					
				</div>
			</div>
		</div>
		<div class="section">
			<div class="main-music">
				<div class="left-music">
					<h3 class="musical">Music</h3>
				</div>

				<div class="music-container">
					
				</div>
			</div>
		</div>
		<div class="section">
			<div class="main-shows">
				<div class="left-shows">
					<h3>TV shows</h3>
				</div>
				<div class="right-shows">
					
				</div>
			</div>
		</div>
	</div>
	<script type="text/javascript">
		window.addEventListener("load", function(){
			const loader = document.querySelector(".wrapper-loader");
			loader.className += " hidden-loader";
		});
		$(document).ready(function() {
			$('#fullpage').fullpage({
				//options here
				autoScrolling:true,
				scrollHorizontally: true,
				navigation: true,
				onLeave: function(index, nextIndex, direction){
					if(index.index === -1){
						$('.open-menu').addClass("white-menu");
					} else if(index.index == 1){
						$('.open-menu').addClass("white-menu");
					} else {
						$('.open-menu').removeClass("white-menu");
					}
				}
			});

			//methods
			$.fn.fullpage.setAllowScrolling(true);
		});
		$(function(){

			$('.wrapper .menu').hide();
		 	$('.open-menu').click(function(){

		 		$('.wrapper .menu').show();
		 		$('.menu').animate({
		 			left: 0,
		 			opacity: '1'
		 		}, 300);

		 		$('.un').delay(400).animate({
		 			opacity: '1'
		 		}, 200);
		 		$('.deux').delay(600).animate({
		 			opacity: '1'
		 		}, 200);
		 		$('.trois').delay(800).animate({
					opacity: '1'
		 		}, 200);
		 		$('.quatre').delay(1000).animate({
		 			opacity: '1'
		 		}, 200);
		 	});
		 	$('.close').click(function(){
		 		$('.quatre').animate({
		 			opacity: '0'
		 		}, 200);
		 		$('.trois').delay(200).animate({
		 			opacity: '0'
		 		}, 200);
		 		$('.deux').delay(400).animate({
		 			opacity: '0'
		 		}, 200);
		 		$('.un').delay(600).animate({
					opacity: '0'
		 		}, 200);

		 		$('.menu').delay(800).animate({
		 			// opacity: '0',
		 			left: '100vw'
		 		}, 300);
		 		$('.menu').delay(1000).hide(0);
		 	});

		 	// Bug to fix :
		 	// - tiret work doesn't work after close
		 	// - disable other <li> when Work active
		 	var open = false;

		 	$('.submenu').click(function(){
		 		open = !open;
		 		if(open){
			 		$(this).children('.submenu-container').css({
			 			opacity: '1',
			 			height: '200px',
			 			// display: 'block',
			 			transition: 'all .3s'
			 		}, 500);
			 		$('.menu > ul > li').css({
			 			opacity: '.3'
			 		});
			 		$(this).css({
			 			opacity: '1'
			 		});
			 		$(this).children('.tiret').css({
			 			width: '80px'
			 		});
			 		$(this).children('.submenu-container').children('li').css('display','block');
		 		} else{
			 		$('.menu > ul > li').css({
			 			opacity: '1'
			 		});
			 		$(this).children('.submenu-container').css({
			 			opacity: '0',
			 			height: '0',
			 			// display: 'none',
			 			transition: 'all .3s'
			 		});
			 		$(this).children('.tiret').css({
			 			width: '0'
			 		});
			 		$(this).children('.submenu-container').children('li').css('display','none');
		 		}
		 	});

		 	// CULTURE PART

		 	$.ajax({
		 		type: "GET",
		 		url: "https://api.deezer.com/user/1567995002/charts/albums?output=jsonp",
		 		dataType: "jsonp",
		 		type: "application/json",
		 		success: function(data){
		 			console.log(data);
		 			for(i = 0; i < 5; i++){
		 				if(data.data[i].cover_big !== null){
		 					$('.music-container').append('<div class="a-music"><img src="' + data.data[i].cover_big + '"><div class="music-infos"><h5>By ' + data.data[i].artist.name + '</h5></div></div>');			
		 				} else {
		 					$('.music-container').append('<div class="a-music"><h2>Pochette non trouvée</h2></p><h5>' + data.data[i].artist.name + '</h5></div>');	
		 				}

		 			}
		 		},
		 		error: function(){
		 			console.log("Erreur lors de la recuperation des resultats");
		 		}
		 	});
		});

		// A RESOUDRE : ANIMER DES BLOBS DE FACON RANDOM AU SURVOL


	</script>
</body>
</html>
